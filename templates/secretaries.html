<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Секретари</title>

<style>

body{
    font-family:Arial;
    background:#f3f4f6;
    margin:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input{
    padding:10px;
    margin:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.add{background:#22c55e;color:white;}
.delete{background:#ef4444;color:white;}
.pass{background:#2563eb;color:white;}

</style>

</head>

<body>

<div class="container">

<h1>Секретари</h1>

<div class="card">

<h3>Добавить секретаря</h3>

<form method="POST" action="/add_secretary">

<input name="name" placeholder="ФИО" required>
<input name="password" placeholder="Пароль" required>

<button class="add">Добавить</button>

</form>

</div>

<div class="card">

<h3>Список</h3>

<table width="100%">

<tr>
<th>Имя</th>
<th>Действия</th>
</tr>

{% for u in users %}

<tr>

<td>{{ u[1] }}</td>

<td>

<a href="/delete_secretary/{{ u[0] }}">
<button class="delete">Удалить</button>
</a>

<form method="POST" action="/change_password/{{ u[0] }}" style="display:inline;">

<input name="password" placeholder="Новый пароль">

<button class="pass">Сменить</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</div>

<a href="/chairman">
<button>Назад</button>
</a>

</div>

</body>
</html>
