<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Секретарь</title>

<style>

body{
    background:#101820;
    color:white;
    font-family:Arial;
    margin:0;
}

.container{
    width:90%;
    margin:auto;
    padding:20px;
}

.card{
    background:#1b2a35;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    border-bottom:1px solid #333;
}

</style>
</head>
<body>

<div class="container">

<h1>Панель секретаря</h1>

<div class="card">

<form method="POST">

<input name="barcode" placeholder="Баркод">

<input type="number" name="print_count" placeholder="Печать">
<input type="number" name="copy_count" placeholder="Копии">
<input type="number" name="notebook_count" placeholder="Тетрадь">
<input type="number" name="ruler_count" placeholder="Линейка">

<button type="submit">
Сохранить
</button>

</form>

</div>

<div class="card">

<h2>Последние действия</h2>

<table>

<tr>
<th>Студент</th>
<th>Секретарь</th>
<th>Действие</th>
</tr>

{% for e in entries %}

<tr>
<td>{{ e.student_name }}</td>
<td>{{ e.secretary }}</td>
<td>{{ e.action_text }}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</body>
</html>
