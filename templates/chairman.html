<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Председатель</title>

<style>

body{
    background:#0f1720;
    color:white;
    font-family:Arial;
    margin:0;
}

.container{
    width:90%;
    margin:auto;
    padding:20px;
}

.card{
    background:#1d2b36;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#0984e3;
    color:white;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<h1>Панель председателя</h1>

<div class="card">

<h2>Изменить пароль</h2>

<form method="POST" action="/change_password">

<input
type="password"
name="new_password"
placeholder="Новый пароль"
required>

<button type="submit">
Изменить пароль
</button>

</form>

</div>

<div class="card">

<h2>Добавить секретаря</h2>

<form method="POST" action="/add_secretary">

<input name="name" placeholder="ФИО">
<input name="password" placeholder="Пароль">

<button type="submit">
Добавить
</button>

</form>

</div>

<div class="card">

<h2>Расписание</h2>

<form method="POST" action="/save_schedule">

{% for day in schedule %}

<label>{{ day }}</label>

<select name="{{ day }}">

<option value="">---</option>

{% for s in secretaries %}

<option
value="{{ s.name }}"
{% if schedule[day] == s.name %}
selected
{% endif %}
>
{{ s.name }}
</option>

{% endfor %}

</select>

{% endfor %}

<button type="submit">
Сохранить расписание
</button>

</form>

</div>

<div class="card">

<a href="/export_excel">
<button>
Скачать Excel
</button>
</a>

</div>

</div>

</body>
</html>
