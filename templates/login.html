<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#f4f4f4;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;

            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;

            border:1px solid #ccc;
            border-radius:8px;

            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;

            border:none;
            border-radius:8px;

            background:#2563eb;
            color:white;

            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        .flash{
            background:#fee2e2;
            color:#991b1b;

            padding:10px;
            border-radius:8px;

            margin-bottom:15px;
            text-align:center;
        }

    </style>
</head>
<body>

<div class="card">

    <h1>Вход</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Логин"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Пароль"
            required
        >

        <button type="submit">
            Войти
        </button>

    </form>

</div>

</body>
</html>
