<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ПРОФКОМ</title>

    <style>

        body{
            font-family:Arial;
            background:#f3f4f6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:20px;
            width:350px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        .logo{
            text-align:center;
            color:#2563eb;
            font-size:42px;
            font-weight:bold;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        .tigers{
            text-align:center;
            color:#777;
            font-style:italic;
            margin-top:-5px;
            margin-bottom:20px;
        }

    </style>

</head>
<body>

<div class="card">

    <div class="logo">
        ПРОФКОМ
    </div>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Логин"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Пароль"
            required
        >

        <div class="tigers">
            для тигров и тигриц
        </div>

        <button type="submit">
            Войти
        </button>

    </form>

</div>

</body>
</html>
